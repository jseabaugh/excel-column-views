<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Column Views</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" type="text/javascript"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-top">
        <div class="logo">
          <img src="assets/icon-32.png" width="20" height="20" alt="Column Views" />
          <span class="logo-text">Column Views</span>
        </div>
        <div id="sheet-badge" class="sheet-badge">—</div>
      </div>
    </header>

    <!-- MAIN PANEL: View List -->
    <div id="panel-views" class="panel active">
      <div class="section-label">SAVED VIEWS</div>

      <div id="views-list" class="views-list">
        <div class="empty-state" id="empty-state">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <rect x="3" y="6" width="6" height="24" rx="2" fill="currentColor" opacity="0.15"/>
            <rect x="11" y="6" width="6" height="24" rx="2" fill="currentColor" opacity="0.3"/>
            <rect x="19" y="6" width="6" height="24" rx="2" fill="currentColor" opacity="0.15"/>
            <rect x="27" y="6" width="6" height="24" rx="2" fill="currentColor" opacity="0.1"/>
            <circle cx="18" cy="18" r="7" fill="var(--accent)" opacity="0.9"/>
            <path d="M15 18h6M18 15v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <p>No views yet</p>
          <span>Create a view to save a column visibility configuration</span>
        </div>
      </div>

      <div class="panel-footer">
        <button id="btn-new-view" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          New View
        </button>
        <button id="btn-show-all" class="btn btn-ghost">Show All</button>
      </div>
    </div>

    <!-- EDITOR PANEL: Create / Edit View -->
    <div id="panel-editor" class="panel">
      <div class="editor-header">
        <button id="btn-back" class="btn-icon" title="Back">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div>
          <div class="section-label" id="editor-mode-label">NEW VIEW</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="view-name-input">View Name</label>
        <input type="text" id="view-name-input" class="form-input" placeholder="e.g. Finance Summary" maxlength="40" />
      </div>

      <div class="form-group form-group-row">
        <div class="form-group-inner">
          <label class="form-label" for="header-row-input">Header Row</label>
          <div class="row-input-wrap">
            <input type="number" id="header-row-input" class="form-input form-input-sm" value="1" min="1" max="1000" />
            <button id="btn-reload-cols" class="btn-reload" title="Reload columns from this row">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M11 6.5A4.5 4.5 0 1 1 6.5 2a4.5 4.5 0 0 1 3.18 1.32L11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M11 2v3H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Reload
            </button>
          </div>
        </div>
      </div>

      <div class="columns-section">
        <div class="columns-header">
          <div class="section-label">COLUMNS — <span id="col-count-label">loading…</span></div>
          <div class="col-actions">
            <button class="btn-tiny" id="btn-check-all">All</button>
            <button class="btn-tiny" id="btn-uncheck-all">None</button>
          </div>
        </div>
        <div class="columns-hint">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><path d="M6 5.5v3M6 4h.01" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Checked columns will be <strong>visible</strong>. Unchecked will be <strong>hidden</strong>.
        </div>
        <div id="columns-list" class="columns-list">
          <div class="loading-spinner">
            <div class="spinner"></div>
            <span>Reading columns…</span>
          </div>
        </div>
      </div>

      <div class="editor-footer">
        <button id="btn-save-view" class="btn btn-primary">Save View</button>
        <button id="btn-cancel-editor" class="btn btn-ghost">Cancel</button>
      </div>
    </div>

    <!-- STATUS TOAST -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
